<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Toy & Creature Reflex Challenge</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Fun, playful dark purple background layout */
            background: linear-gradient(135deg, #2c1a4d 0%, #130924 100%);
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 2.3rem;
            margin-bottom: 5px;
            color: #ffb703;
            text-shadow: 0 4px 10px rgba(255, 183, 3, 0.3);
        }

        .score-board {
            font-size: 1.4rem;
            margin-bottom: 10px;
            color: #a2d2ff;
        }

        /* CHARACTER SELECTOR SHOP (Unlocks with High Scores) */
        .character-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .char-btn {
            background: #3a2263;
            border: 2px solid #563594;
            color: white;
            padding: 8px 14px;
            font-size: 1.1rem;
            border-radius: 20px;
            cursor: not-allowed;
            opacity: 0.4;
            transition: all 0.2s ease;
        }

        /* When the character is unlocked and usable */
        .char-btn.unlocked {
            cursor: pointer;
            opacity: 1;
            border-color: #ffb703;
        }

        .char-btn.active {
            background: #ffb703;
            color: #130924;
            box-shadow: 0 0 15px #ffb703;
            transform: scale(1.05);
        }

        /* 3x3 Round Game Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 95px);
            grid-template-rows: repeat(3, 95px);
            gap: 15px;
            margin-bottom: 25px;
        }

        .tile {
            background-color: #22143b;
            border: 3px solid #37215e;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.05s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: inset 0 0 12px rgba(0,0,0,0.6);
        }

        /* Active Target Pop Up Styling */
        .tile.active {
            background-color: #ff85a2;
            border-color: #ffffff;
            box-shadow: 0 0 25px #ff85a2, inset 0 0 10px #ffffff;
            transform: scale(1.06);
        }

        .tile.hit-success {
            background-color: #b5e2fa;
            box-shadow: 0 0 30px #b5e2fa;
        }

        /* Big Play Action Button */
        .btn {
            background: linear-gradient(90deg, #ffb703, #ff85a2);
            color: #130924;
            border: none;
            padding: 12px 45px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 133, 162, 0.4);
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <h1>TOY CRITTERS POP!</h1>
    <div class="score-board">Score: <span id="score">0</span> | High Score: <span id="highScore">0</span></div>

    <!-- Character Unlock Hub -->
    <div class="character-selector">
        <button class="char-btn unlocked active" id="btn-teddy" onclick="changeCharacter('🧸', 'teddy')">🧸 Bear</button>
        <button class="char-btn" id="btn-snake" onclick="changeCharacter('🐍', 'snake')">🔒 Snake (Score 5)</button>
        <button class="char-btn" id="btn-spider" onclick="changeCharacter('🕷️', 'spider')">🔒 Spidey (Score 10)</button>
        <button class="char-btn" id="btn-butterfly" onclick="changeCharacter('🦋', 'butterfly')">🔒 Fly (Score 15)</button>
    </div>

    <!-- Game Playing Grid Area -->
    <div class="grid" id="grid">
        <div class="tile" data-id="0"></div>
        <div class="tile" data-id="1"></div>
        <div class="tile" data-id="2"></div>
        <div class="tile" data-id="3"></div>
        <div class="tile" data-id="4"></div>
        <div class="tile" data-id="5"></div>
        <div class="tile" data-id="6"></div>
        <div class="tile" data-id="7"></div>
        <div class="tile" data-id="8"></div>
    </div>

    <button class="btn" id="startBtn">START GAME</button>

    <script>
        const tiles = document.querySelectorAll('.tile');
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');
        
        // Character buttons
        const btnSnake = document.getElementById('btn-snake');
        const btnSpider = document.getElementById('btn-spider');
        const btnButterfly = document.getElementById('btn-butterfly');

        let score = 0;
        let highScore = 0;
        let currentTarget = "🧸"; // Teddy bear is default starter
        let activeTile = null;
        let gameTimer = null;
        let speed = 1000; 
        let isPlaying = false;

        // Lets players switch their character icon IF they unlocked it
        function changeCharacter(emoji, type) {
            if (isPlaying) return;
            
            if (type === 'snake' && highScore < 5) return;
            if (type === 'spider' && highScore < 10) return;
            if (type === 'butterfly' && highScore < 15) return;

            currentTarget = emoji;
            document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${type}`).classList.add('active');
        }

        startBtn.addEventListener('click', () => {
            if (isPlaying) return;
            isPlaying = true;
            score = 0;
            speed = 1000;
            scoreDisplay.innerText = score;
            startBtn.classList.add('hidden');
            nextTick();
        });

        function flashRandomTile() {
            if (activeTile) {
                activeTile.classList.remove('active');
                activeTile.innerText = "";
                endGame();
                return;
            }

            const randomIndex = Math.floor(Math.random() * tiles.length);
            activeTile = tiles[randomIndex];
            activeTile.classList.add('active');
            activeTile.innerText = currentTarget;

            gameTimer = setTimeout(() => {
                flashRandomTile();
            }, speed);
        }

        function nextTick() {
            flashRandomTile();
        }

        tiles.forEach(tile => {
            tile.addEventListener('click', () => {
                if (!isPlaying) return;

                if (tile === activeTile) {
                    score++;
                    scoreDisplay.innerText = score;
                    clearTimeout(gameTimer);
                    activeTile.classList.remove('active');
                    activeTile.innerText = "";
                    
                    tile.classList.add('hit-success');
                    setTimeout(() => tile.classList.remove('hit-success'), 80);
                    
                    activeTile = null;
                    if (speed > 350) speed -= 40; 
                    nextTick();
                } else {
                    endGame();
                }
            });
        });

        function endGame() {
            isPlaying = false;
            clearTimeout(gameTimer);
            tiles.forEach(t => {
                t.classList.remove('active');
                t.innerText = "";
            });
            activeTile = null;

            // Check and set High Score
            if (score > highScore) {
                highScore = score;
                highScoreDisplay.innerText = highScore;
                checkUnlocks();
            }
            
            startBtn.classList.remove('hidden');
            startBtn.innerText = "PLAY AGAIN";
            alert("Game Over! Your score: " + score);
        }

        // Checks high score milestones to unlock secret players permanently
        function checkUnlocks() {
            if (highScore >= 5) {
                btnSnake.classList.add('unlocked');
                btnSnake.innerText = "🐍 Snake";
            }
            if (highScore >= 10) {
                btnSpider.classList.add('unlocked');
                btnSpider.innerText = "🕷️ Spidey";
            }
            if (highScore >= 15) {
                btnButterfly.classList.add('unlocked');
                btnButterfly.innerText = "🦋 Fly";
            }
        }
    </script>
</body>
</html>
